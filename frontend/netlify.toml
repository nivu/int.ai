[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# SPA fallback redirect — Next.js handles routing, but this ensures
# Netlify does not return 404 for client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers applied to all responses.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
